services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: overlay
      POSTGRES_USER: overlay
      POSTGRES_PASSWORD: overlay
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overlay -d overlay"]
      interval: 5s
      timeout: 5s
      retries: 10
